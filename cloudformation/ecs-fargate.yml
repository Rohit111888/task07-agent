AWSTemplateFormatVersion: "2010-09-09"

Description: >
  Task 07 production deployment for the FastAPI automotive AI agent.
  The internet-facing Application Load Balancer runs in existing public
  subnets and terminates HTTPS using an ACM certificate. ECS Fargate tasks
  run in private subnets without public IP addresses and access external
  services through a NAT Gateway.

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Default: vpc-05f724520455a11b5
    Description: Existing VPC for the deployment

  PublicSubnetOne:
    Type: AWS::EC2::Subnet::Id
    Default: subnet-0b809b4859881f27e
    Description: Existing public subnet in us-east-1a for the ALB and NAT Gateway

  PublicSubnetTwo:
    Type: AWS::EC2::Subnet::Id
    Default: subnet-029d52a653c8b0907
    Description: Existing public subnet in us-east-1f for the ALB

  ImageUri:
    Type: String
    Default: 654999855057.dkr.ecr.us-east-1.amazonaws.com/task07-agent:v1.0.6
    Description: Complete Amazon ECR image URI including the image tag

  AnthropicSecretArn:
    Type: String
    Default: arn:aws:secretsmanager:us-east-1:654999855057:secret:task07/anthropic-api-key-LEEcmr
    Description: ARN of the Secrets Manager secret containing ANTHROPIC_API_KEY

  CertificateArn:
    Type: String
    Description: >
      ARN of the ACM certificate issued for testagent.cciplatform-ai.com.
      The certificate must exist in us-east-1.

  ApplicationDomainName:
    Type: String
    Default: testagent.cciplatform-ai.com
    Description: DNS hostname configured to point to the Application Load Balancer

Resources:
  # =========================================================
  # Private networking
  # =========================================================

  PrivateSubnetOne:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VpcId
      AvailabilityZone: us-east-1a
      CidrBlock: 172.31.96.0/24
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: task07-private-subnet-1a
        - Key: Project
          Value: Task07

  PrivateSubnetTwo:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VpcId
      AvailabilityZone: us-east-1f
      CidrBlock: 172.31.97.0/24
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: task07-private-subnet-1f
        - Key: Project
          Value: Task07

  NatGatewayElasticIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: task07-nat-eip
        - Key: Project
          Value: Task07

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatGatewayElasticIP.AllocationId
      SubnetId: !Ref PublicSubnetOne
      Tags:
        - Key: Name
          Value: task07-nat-gateway
        - Key: Project
          Value: Task07

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VpcId
      Tags:
        - Key: Name
          Value: task07-private-route-table
        - Key: Project
          Value: Task07

  PrivateDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn:
      - NatGateway
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateSubnetOneRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetOne
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnetTwoRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetTwo
      RouteTableId: !Ref PrivateRouteTable

  # =========================================================
  # CloudWatch logging
  # =========================================================

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/task07-agent
      RetentionInDays: 7
      Tags:
        - Key: Project
          Value: Task07

  # =========================================================
  # ECS cluster
  # =========================================================

  Cluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: task07-agent-cluster
      ClusterSettings:
        - Name: containerInsights
          Value: enabled
      Tags:
        - Key: Project
          Value: Task07

  # =========================================================
  # Security groups
  # =========================================================

  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow public HTTP and HTTPS traffic to the ALB
      VpcId: !Ref VpcId

      SecurityGroupIngress:
        - Description: Allow HTTP for redirection to HTTPS
          IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

        - Description: Allow HTTPS from the internet
          IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0

      SecurityGroupEgress:
        - Description: Allow outbound traffic from the ALB
          IpProtocol: -1
          CidrIp: 0.0.0.0/0

      Tags:
        - Key: Name
          Value: task07-alb-security-group
        - Key: Project
          Value: Task07

  ECSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow the ALB to communicate with private ECS tasks
      VpcId: !Ref VpcId

      SecurityGroupIngress:
        - Description: Allow application traffic only from the ALB
          IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          SourceSecurityGroupId: !Ref ALBSecurityGroup

      SecurityGroupEgress:
        - Description: Allow ECS tasks to access ECR, AWS services, and Anthropic through NAT
          IpProtocol: -1
          CidrIp: 0.0.0.0/0

      Tags:
        - Key: Name
          Value: task07-ecs-security-group
        - Key: Project
          Value: Task07

  # =========================================================
  # Application Load Balancer
  # =========================================================

  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: task07-agent-alb
      Scheme: internet-facing
      Type: application
      IpAddressType: ipv4

      SecurityGroups:
        - !Ref ALBSecurityGroup

      Subnets:
        - !Ref PublicSubnetOne
        - !Ref PublicSubnetTwo

      LoadBalancerAttributes:
        - Key: deletion_protection.enabled
          Value: "false"

        - Key: idle_timeout.timeout_seconds
          Value: "60"

        - Key: routing.http.drop_invalid_header_fields.enabled
          Value: "true"

      Tags:
        - Key: Name
          Value: task07-agent-alb
        - Key: Project
          Value: Task07

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      VpcId: !Ref VpcId
      Port: 8000
      Protocol: HTTP
      ProtocolVersion: HTTP1
      TargetType: ip

      HealthCheckEnabled: true
      HealthCheckPath: /health
      HealthCheckProtocol: HTTP
      HealthCheckPort: traffic-port
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5

      Matcher:
        HttpCode: "200"

      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: "30"

      Tags:
        - Key: Name
          Value: task07-agent-target-group
        - Key: Project
          Value: Task07

  # HTTP traffic is redirected to HTTPS.
  HttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 80
      Protocol: HTTP

      DefaultActions:
        - Type: redirect
          RedirectConfig:
            Protocol: HTTPS
            Port: "443"
            Host: "#{host}"
            Path: "/#{path}"
            Query: "#{query}"
            StatusCode: HTTP_301

  # HTTPS terminates at the ALB and forwards HTTP internally
  # to the private ECS tasks on port 8000.
  HttpsListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 443
      Protocol: HTTPS

      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06

      Certificates:
        - CertificateArn: !Ref CertificateArn

      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  # =========================================================
  # ECS task execution IAM role
  # =========================================================

  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: task07-agent-execution-role

      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ecs-tasks.amazonaws.com
            Action:
              - sts:AssumeRole

      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

      Policies:
        - PolicyName: task07-secret-access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ReadAnthropicSecret
                Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref AnthropicSecretArn

      Tags:
        - Key: Project
          Value: Task07

  # =========================================================
  # ECS task definition
  # =========================================================

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: task07-agent-task

      RequiresCompatibilities:
        - FARGATE

      Cpu: "512"
      Memory: "1024"
      NetworkMode: awsvpc
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn

      RuntimePlatform:
        CpuArchitecture: X86_64
        OperatingSystemFamily: LINUX

      ContainerDefinitions:
        - Name: task07-agent
          Image: !Ref ImageUri
          Essential: true

          PortMappings:
            - ContainerPort: 8000
              HostPort: 8000
              Protocol: tcp
              Name: http-8000
              AppProtocol: http

          Secrets:
            - Name: ANTHROPIC_API_KEY
              ValueFrom: !Sub "${AnthropicSecretArn}:ANTHROPIC_API_KEY::"

          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs

          HealthCheck:
            Command:
              - CMD-SHELL
              - >
                python -c
                "import urllib.request;
                urllib.request.urlopen('http://localhost:8000/health',
                timeout=5)"
                || exit 1
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 60

      Tags:
        - Key: Project
          Value: Task07

  # =========================================================
  # ECS service in private subnets
  # =========================================================

  ECSService:
    Type: AWS::ECS::Service
    DependsOn:
      - HttpsListener
      - PrivateDefaultRoute
      - PrivateSubnetOneRouteTableAssociation
      - PrivateSubnetTwoRouteTableAssociation

    Properties:
      ServiceName: task07-agent-service
      Cluster: !Ref Cluster
      LaunchType: FARGATE
      PlatformVersion: LATEST
      DesiredCount: 1
      TaskDefinition: !Ref TaskDefinition

      HealthCheckGracePeriodSeconds: 60

      DeploymentConfiguration:
        MinimumHealthyPercent: 100
        MaximumPercent: 200
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true

      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED

          SecurityGroups:
            - !Ref ECSSecurityGroup

          Subnets:
            - !Ref PrivateSubnetOne
            - !Ref PrivateSubnetTwo

      LoadBalancers:
        - ContainerName: task07-agent
          ContainerPort: 8000
          TargetGroupArn: !Ref TargetGroup

      EnableECSManagedTags: true
      PropagateTags: SERVICE

      Tags:
        - Key: Name
          Value: task07-agent-service
        - Key: Project
          Value: Task07

Outputs:
  LoadBalancerDNS:
    Description: Public Application Load Balancer DNS name
    Value: !GetAtt LoadBalancer.DNSName

  SecureApplicationEndpoint:
    Description: Secure public application endpoint
    Value: !Sub "https://${ApplicationDomainName}"

  SecureHealthEndpoint:
    Description: Secure health-check endpoint
    Value: !Sub "https://${ApplicationDomainName}/health"

  SecureQueryEndpoint:
    Description: Secure agent-query endpoint
    Value: !Sub "https://${ApplicationDomainName}/query"

  SecureSwaggerEndpoint:
    Description: Secure FastAPI Swagger documentation endpoint
    Value: !Sub "https://${ApplicationDomainName}/docs"

  HttpRedirectEndpoint:
    Description: HTTP endpoint that redirects to HTTPS
    Value: !Sub "http://${ApplicationDomainName}"

  PrivateSubnetOneId:
    Description: First private ECS subnet
    Value: !Ref PrivateSubnetOne

  PrivateSubnetTwoId:
    Description: Second private ECS subnet
    Value: !Ref PrivateSubnetTwo

  NatGatewayId:
    Description: NAT Gateway used by private ECS tasks
    Value: !Ref NatGateway

  ECSClusterName:
    Description: ECS cluster name
    Value: !Ref Cluster

  ECSServiceName:
    Description: ECS service name
    Value: !GetAtt ECSService.Name