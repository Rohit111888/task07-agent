name: Build, Test, and Push Docker Image

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: task07-agent
  SEMANTIC_TAG: v1.0.${{ github.run_number }}
  SHA_TAG: ${{ github.sha }}

jobs:
  build-test-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Python syntax checks
        run: |
          python -m compileall app

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and tag Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY:$SEMANTIC_TAG \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY:$SHA_TAG \
            .

      - name: Test Docker container
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker run -d \
            --name task07-test \
            -p 8000:8000 \
            -e ANTHROPIC_API_KEY=dummy-test-key \
            $ECR_REGISTRY/$ECR_REPOSITORY:$SEMANTIC_TAG

          for i in {1..12}; do
            if curl --fail http://localhost:8000/health; then
              echo "Container health test passed"
              docker rm -f task07-test
              exit 0
            fi

            echo "Waiting for container..."
            sleep 5
          done

          echo "Container failed to become healthy"
          docker logs task07-test
          docker rm -f task07-test
          exit 1

      - name: Push semantic-version image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker push \
            $ECR_REGISTRY/$ECR_REPOSITORY:$SEMANTIC_TAG

      - name: Push Git SHA image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker push \
            $ECR_REGISTRY/$ECR_REPOSITORY:$SHA_TAG

      - name: Display published image tags
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          echo "Semantic version:"
          echo "$ECR_REGISTRY/$ECR_REPOSITORY:$SEMANTIC_TAG"
          echo "Git SHA:"
          echo "$ECR_REGISTRY/$ECR_REPOSITORY:$SHA_TAG"